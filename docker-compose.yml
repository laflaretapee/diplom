services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-japonica}
      POSTGRES_USER: ${POSTGRES_USER:-japonica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-japonica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-japonica}", "-d", "${POSTGRES_DB:-japonica}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/japonica_crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_APP_MODULE: ${API_APP_MODULE:-backend.app.main:app}
      API_PORT: ${API_PORT:-8000}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage/private}
    volumes:
      - ./:/workspace
      - storage_data:/app/storage
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir uv &&
      uv sync --frozen --no-dev &&
      uv run uvicorn ${API_APP_MODULE:-backend.app.main:app} --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/japonica_crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_APP: ${WORKER_APP:-backend.app.worker.celery_app}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage/private}
    volumes:
      - ./:/workspace
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir uv &&
      uv sync --frozen --no-dev &&
      uv run celery -A ${WORKER_APP:-backend.app.worker.celery_app} worker --beat --loglevel=info"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/workspace/.venv/bin/python -c \"from backend.app.worker import healthcheck; assert healthcheck.run() == 'ok'\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /workspace/frontend
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  storage_data:
  frontend_node_modules:
