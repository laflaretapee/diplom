services:
  api:
    environment:
      APP_ENV: production
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: lax
      CORS_ORIGINS: '["https://${NGINX_SERVER_NAME:-localhost}"]'

  worker:
    environment:
      APP_ENV: production

  nginx:
    command: >
      sh -c "rm -f /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'"
    ports:
      - "443:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    volumes:
      - ./nginx/production.conf.template:/etc/nginx/templates/prod.conf.template:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"

volumes:
  letsencrypt:
  certbot_www:
